modLoader = "javafml"
loaderVersion = "[2,)"
license = "LGPL-3.0"
issueTrackerURL = "https://github.com/apehum/replaymod-audio-render/issues"

[[mods]]
modId = "${mod_id}"
version = "${mod_version}"
displayName = "${mod_name}"
description = '''${mod_description}'''
authors = "Apehum"
logoFile = "assets/replaymodaudiorender/icon.png"

[[dependencies.${mod_id}]]
modId = "neoforge"
type = "required"
ordering = "NONE"
side = "BOTH"

[[dependencies.${mod_id}]]
modId = "minecraft"
type = "required"
versionRange = "${minecraft_version_range}"

[[dependencies.${mod_id}]]
modId = "replaymod"
type = "required"
ordering = "AFTER"
side = "BOTH"
